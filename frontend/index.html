<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatbot LATAM</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f6f6f6;
    }

    h1 {
      margin-bottom: 12px;
    }

    #status {
      margin-bottom: 12px;
      font-size: 14px;
      color: #555;
    }

    #chat {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      min-height: 360px;
      max-height: 520px;
      margin-bottom: 12px;
      overflow-y: auto;
    }

    .msg {
      margin: 10px 0;
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .user {
      background: #e8f0ff;
    }

    .bot {
      background: #eeeeee;
    }

    .error {
      background: #ffe5e5;
      color: #8a0000;
    }

    .sources {
      background: #f8f8f8;
      border-radius: 10px;
      padding: 10px 12px;
      margin: 10px 0;
      font-size: 13px;
      color: #444;
    }

    .sources summary {
      cursor: pointer;
      font-weight: bold;
    }

    .source-text {
      margin: 4px 0 10px 0;
      font-size: 12px;
      color: #666;
    }

    form {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #bbb;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <h1>Chatbot LATAM</h1>

  <div id="status">Conectando con backend...</div>

  <div id="chat"></div>

  <form id="form">
    <input id="question" placeholder="Escribe tu pregunta..." autocomplete="off" />
    <button id="sendButton" type="submit">Enviar</button>
  </form>

  <script>
    const API_BASE_URL = "http://127.0.0.1:8000";
    const HEALTH_URL = API_BASE_URL + "/api/chat/health";
    const ASK_URL = API_BASE_URL + "/api/chat/ask";

    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const question = document.getElementById("question");
    const sendButton = document.getElementById("sendButton");
    const statusBox = document.getElementById("status");

    const sessionId = "web-" + Date.now();

    function addMessage(text, type = "bot") {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function addSources(sources) {
      if (!Array.isArray(sources) || sources.length === 0) return;

      const details = document.createElement("details");
      details.className = "sources";

      const summary = document.createElement("summary");
      summary.textContent = "Fuentes (" + sources.length + ")";
      details.appendChild(summary);

      const list = document.createElement("ul");

      sources.forEach((source) => {
        const item = document.createElement("li");

        const title = source.title || "Fuente sin título";
        const confidence =
          typeof source.confidence === "number"
            ? " — confianza: " + source.confidence.toFixed(2)
            : "";

        item.textContent = title + confidence;
        list.appendChild(item);

        if (source.text) {
          const sourceText = document.createElement("div");
          sourceText.className = "source-text";
          sourceText.textContent = source.text;
          list.appendChild(sourceText);
        }
      });

      details.appendChild(list);
      chat.appendChild(details);
      chat.scrollTop = chat.scrollHeight;
    }

    async function checkBackendHealth() {
      try {
        const response = await fetch(HEALTH_URL, {
          method: "GET"
        });

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        statusBox.textContent = "Backend conectado";
        statusBox.style.color = "green";
      } catch (error) {
        statusBox.textContent =
          "Backend no conectado. Revisa que uvicorn esté corriendo en http://127.0.0.1:8000";
        statusBox.style.color = "#8a0000";
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const text = question.value.trim();
      if (!text) return;

      addMessage(text, "user");
      question.value = "";

      const thinkingMessage = addMessage("Pensando...", "bot");
      sendButton.disabled = true;

      try {
        const response = await fetch(ASK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: text,
            country: "latam",
            sessionId: sessionId
          })
        });

        const data = await response.json().catch(() => null);

        thinkingMessage.remove();

        if (!response.ok) {
          addMessage(
            data && data.detail
              ? JSON.stringify(data.detail, null, 2)
              : "Error del backend. HTTP " + response.status,
            "error"
          );
          return;
        }

        addMessage(
          data && data.answer
            ? data.answer
            : "El backend respondió, pero no envió el campo answer.",
          "bot"
        );

        if (data && data.safeMode) {
          addMessage("Respuesta generada en modo seguro.", "bot");
        }

        if (data && data.sources) {
          addSources(data.sources);
        }
      } catch (error) {
        thinkingMessage.remove();
        addMessage("Error conectando con el backend: " + error.message, "error");
      } finally {
        sendButton.disabled = false;
        question.focus();
      }
    });

    checkBackendHealth();
  </script>
</body>
</html>
